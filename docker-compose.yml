services:
  train:
    build:
      context: .
      dockerfile: docker/train.Dockerfile
    image: fyp-playground-train:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    tty: true
    stdin_open: true
    command: ["scripts/train_coco_person.py", "--help"]

  export:
    build:
      context: .
      dockerfile: docker/export.Dockerfile
    image: fyp-playground-export:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    tty: true
    stdin_open: true
    command: ["scripts/run_export.py", "--help"]

  quantize:
    build:
      context: .
      dockerfile: docker/quantize.Dockerfile
    image: fyp-playground-quantize:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    tty: true
    stdin_open: true
    gpus: all
    command: ["scripts/run_quantize.py", "--help"]

