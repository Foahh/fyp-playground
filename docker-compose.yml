services:
  quantize:
    build:
      context: .
      dockerfile: docker/tensorflow.Dockerfile
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
    tty: true
    stdin_open: true
    gpus: all
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    command: ["scripts/run_quantize.py", "--help"]
