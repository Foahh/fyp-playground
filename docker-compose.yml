services:
  train:
    build:
      context: .
      dockerfile: docker/train.Dockerfile
    image: fyp-playground-train:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    tty: true
    stdin_open: true
    command: ["train_coco_person.py", "--help"]

  export:
    build:
      context: .
      dockerfile: docker/export.Dockerfile
    image: fyp-playground-export:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    tty: true
    stdin_open: true
    command: ["run_export.py", "--help"]

